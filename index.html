<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFAST Symposium 2026 | Master Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // ============================================================
        // PASTE YOUR FIREBASE KEYS BELOW
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyDR2PyIsbw_hC-VX_o1wq3Hrs8ENsw6ik4",
            authDomain: "symposium-planner.firebaseapp.com",
            databaseURL: "https://symposium-planner-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "symposium-planner",
            storageBucket: "symposium-planner.firebasestorage.app",
            messagingSenderId: "849349532944",
            appId: "1:849349532944:web:7f24c18136cacdaee19995",
            measurementId: "G-TNQQ95DHMX"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        window.dbRef = ref(db, 'symposium_2026_v3'); 
        window.saveToCloud = (data) => set(window.dbRef, data);
        window.onCloudUpdate = (callback) => onValue(window.dbRef, (snapshot) => callback(snapshot.val()));
    </script>

    <style>
        [x-cloak] { display: none !important; }
        .session-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .sortable-ghost { opacity: 0.1; background: #e2e8f0; }
        .drag-handle { cursor: grab; }
        .drag-handle:active { cursor: grabbing; }
    </style>
</head>
<body class="bg-[#F1F5F9] text-slate-900 antialiased" x-data="plannerApp()" x-init="init()">

    <!-- HEADER SECTION -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
        <div class="max-w-[1600px] mx-auto px-8 h-24 flex justify-between items-center">
            <h1 class="text-xl md:text-2xl font-black tracking-tight text-slate-800">
                iFAST Global Wealth Adviser <span class="text-blue-600">Symposium Conference Topics 2026</span>
            </h1>

            <div class="flex items-center gap-4">
                <div class="flex bg-slate-100 p-1 rounded-xl border border-slate-200">
                    <button @click="toggleEdit()" :class="isEdit ? 'bg-white shadow text-blue-600' : 'text-slate-500'" class="px-6 py-2 rounded-lg text-sm font-black transition-all uppercase tracking-widest">Edit</button>
                    <button @click="isEdit = false" :class="!isEdit ? 'bg-white shadow text-emerald-600' : 'text-slate-500'" class="px-6 py-2 rounded-lg text-sm font-black transition-all uppercase tracking-widest">Published</button>
                </div>
                <button @click="exportExcel()" class="bg-slate-900 text-white px-5 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 hover:bg-slate-800 transition">
                    <i data-lucide="download" size="18"></i> Export
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-[1600px] mx-auto px-8 py-10">
        <!-- THEME HEADER -->
        <div class="mb-12">
            <template x-if="isEdit">
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-blue-500 uppercase tracking-widest">Symposium Theme</label>
                    <input type="text" x-model="data.conferenceTheme" @input="sync()" class="text-5xl font-black text-slate-900 bg-transparent border-b-4 border-blue-100 w-full outline-none focus:border-blue-500 py-2">
                </div>
            </template>
            <h2 x-show="!isEdit" class="text-6xl font-black text-slate-900 tracking-tighter" x-text="data.conferenceTheme"></h2>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
            
            <template x-for="d in [1, 2]">
                <div class="space-y-6">
                    <!-- DAY HEADER -->
                    <div :class="d === 1 ? 'bg-slate-900' : 'bg-blue-700'" class="rounded-[2rem] p-8 text-white shadow-xl">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="text-4xl font-black italic">DAY 0<span x-text="d"></span></h3>
                            <div class="text-right">
                                <span class="text-[10px] font-bold uppercase opacity-60">Start Time</span>
                                <input x-show="isEdit" type="time" x-model="data['day'+d+'StartTime']" @input="sync()" class="bg-white/10 rounded-lg px-2 block font-black text-xl outline-none mt-1">
                                <span x-show="!isEdit" class="block font-black text-2xl" x-text="data['day'+d+'StartTime']"></span>
                            </div>
                        </div>
                        <template x-if="isEdit">
                            <input type="text" x-model="data['day'+d+'Theme']" @input="sync()" class="bg-transparent border-b border-white/20 text-xl outline-none w-full">
                        </template>
                        <p x-show="!isEdit" class="text-xl font-medium opacity-80" x-text="data['day'+d+'Theme']"></p>
                    </div>

                    <!-- SESSION LIST -->
                    <div :id="'day'+d+'-list'" class="space-y-4 min-h-[200px]">
                        <template x-for="(item, index) in (d === 1 ? calculatedDay1 : calculatedDay2)" :key="item.id">
                            <div class="session-card bg-white p-6 rounded-[1.5rem] border border-slate-200 shadow-sm relative border-l-[12px]" :class="getColor(item.type)">
                                <div class="flex justify-between items-start mb-4">
                                    <div class="flex flex-wrap gap-2">
                                        <span class="text-[10px] font-black uppercase tracking-widest px-2.5 py-1 rounded bg-slate-100 text-slate-600" x-text="item.type"></span>
                                        <span class="text-[10px] font-black uppercase tracking-widest px-2.5 py-1 rounded bg-blue-50 text-blue-600 flex items-center gap-1">
                                            <i data-lucide="clock" size="10"></i> <span x-text="item.duration + ' MIN'"></span>
                                        </span>
                                    </div>
                                    <div class="text-right font-black text-2xl text-slate-800 tracking-tighter" x-text="item.start + ' — ' + item.end"></div>
                                </div>
                                
                                <h4 class="text-xl font-bold text-slate-900 mb-3 leading-tight" x-text="item.topic"></h4>
                                
                                <div class="flex justify-between items-center border-t border-slate-50 pt-4">
                                    <p class="text-sm font-bold text-slate-400 flex items-center gap-2">
                                        <i data-lucide="user" size="14"></i> <span x-text="item.speaker"></span>
                                    </p>
                                    
                                    <div x-show="isEdit" class="flex gap-1">
                                        <button @click="editItem(d, item)" class="p-2 text-blue-500 hover:bg-blue-50 rounded-lg"><i data-lucide="edit-3" size="16"></i></button>
                                        <button @click="deleteItem(d, item.id)" class="p-2 text-red-400 hover:bg-red-50 rounded-lg"><i data-lucide="trash-2" size="16"></i></button>
                                        <div class="drag-handle p-2 text-slate-300 hover:text-slate-600"><i data-lucide="grip-vertical" size="18"></i></div>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>

                    <button x-show="isEdit" @click="addItem(d)" class="w-full border-4 border-dashed border-slate-200 p-8 rounded-[2rem] text-slate-400 font-black text-xl hover:bg-white hover:border-blue-300 hover:text-blue-500 transition-all">
                        + Add Session to Day <span x-text="d"></span>
                    </button>
                </div>
            </template>
        </div>
    </main>

    <!-- MODAL -->
    <div x-show="showModal" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/50 backdrop-blur-md" x-cloak x-transition>
        <div class="bg-white rounded-[2.5rem] max-w-2xl w-full p-10 shadow-2xl">
            <h3 class="text-3xl font-black text-slate-900 mb-8" x-text="editingId ? 'Edit Session' : 'New Session'"></h3>
            
            <div class="grid grid-cols-1 gap-6">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Topic</label>
                    <input x-model="form.topic" class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-xl outline-none focus:border-blue-500 font-bold">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Speaker</label>
                    <input x-model="form.speaker" class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-xl outline-none focus:border-blue-500 font-bold">
                </div>
                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Duration (Mins)</label>
                        <input type="number" x-model="form.duration" class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-xl outline-none focus:border-blue-500 font-bold">
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Type</label>
                        <select x-model="form.type" class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-xl outline-none focus:border-blue-500 font-bold appearance-none">
                            <option value="Internal Keynote">Internal Keynote</option>
                            <option value="External Keynote">External Keynote</option>
                            <option value="Panel Discussion">Panel Discussion</option>
                            <option value="Fireside Chat">Fireside Chat</option>
                            <option value="Break">Break</option>
                            <option value="Lunch">Lunch</option>
                            <option value="Workshop">Workshop</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="flex gap-4 mt-10">
                <button @click="showModal = false" class="flex-1 p-4 font-bold text-slate-400">Cancel</button>
                <button @click="saveEntry()" class="flex-1 bg-blue-600 text-white p-4 rounded-xl font-black text-lg shadow-lg shadow-blue-100">Save Session</button>
            </div>
        </div>
    </div>

    <script>
        function plannerApp() {
            return {
                isEdit: false, showModal: false, editingId: null, activeDay: 1,
                data: { conferenceTheme: 'Connecting...', day1Events: [], day2Events: [] },
                form: { topic: '', speaker: '', duration: 20, type: 'Internal Keynote' },

                init() {
                    setTimeout(() => {
                        window.onCloudUpdate((cloudData) => {
                            if (cloudData && cloudData.day1Events) {
                                this.data = JSON.parse(JSON.stringify(cloudData));
                            } else {
                                this.data = this.getFullDataset();
                                this.sync();
                            }
                            this.$nextTick(() => { 
                                lucide.createIcons();
                                this.initSortable(1); this.initSortable(2);
                            });
                        });
                    }, 1000);
                },

                sync() { window.saveToCloud(JSON.parse(JSON.stringify(this.data))); },

                toggleEdit() {
                    const pw = prompt("Admin Password:");
                    if (pw === "ifast2026") { this.isEdit = true; this.$nextTick(() => lucide.createIcons()); }
                },

                calculate(events, startTime) {
                    if (!events) return [];
                    let curr = (startTime || "09:30").split(':').reduce((h, m) => h * 60 + parseInt(m), 0);
                    return events.map(e => {
                        const start = `${Math.floor(curr/60).toString().padStart(2,'0')}:${(curr%60).toString().padStart(2,'0')}`;
                        curr += parseInt(e.duration || 0);
                        const end = `${Math.floor(curr/60).toString().padStart(2,'0')}:${(curr%60).toString().padStart(2,'0')}`;
                        return { ...e, start, end };
                    });
                },

                get calculatedDay1() { return this.calculate(this.data.day1Events, this.data.day1StartTime); },
                get calculatedDay2() { return this.calculate(this.data.day2Events, this.data.day2StartTime); },

                initSortable(d) {
                    const el = document.getElementById(`day${d}-list`);
                    if (!el) return;
                    if (el.sortableInstance) el.sortableInstance.destroy();
                    el.sortableInstance = Sortable.create(el, {
                        handle: '.drag-handle', animation: 200,
                        onEnd: (evt) => {
                            const listKey = `day${d}Events`;
                            const list = [...this.data[listKey]];
                            const item = list.splice(evt.oldIndex, 1)[0];
                            list.splice(evt.newIndex, 0, item);
                            this.data[listKey] = list;
                            this.sync();
                        }
                    });
                },

                addItem(d) {
                    this.activeDay = d; this.editingId = null;
                    this.form = { topic: '', speaker: '', duration: 20, type: 'Internal Keynote' };
                    this.showModal = true;
                },

                editItem(d, item) {
                    this.activeDay = d; this.editingId = item.id;
                    this.form = { ...item };
                    this.showModal = true;
                },

                saveEntry() {
                    const listKey = `day${this.activeDay}Events`;
                    const list = [...this.data[listKey]];
                    if (this.editingId) {
                        const idx = list.findIndex(e => e.id === this.editingId);
                        list[idx] = { ...this.form };
                    } else {
                        list.push({ ...this.form, id: Date.now().toString() });
                    }
                    this.data[listKey] = list;
                    this.showModal = false; this.sync();
                },

                deleteItem(d, id) {
                    if(confirm("Delete session?")) {
                        this.data[`day${d}Events`] = this.data[`day${d}Events`].filter(e => e.id !== id);
                        this.sync();
                    }
                },

                getColor(type) {
                    const map = { 
                        'Internal Keynote': 'border-blue-600 bg-blue-50/20', 
                        'External Keynote': 'border-purple-600 bg-purple-50/20',
                        'Panel Discussion': 'border-cyan-500 bg-cyan-50/20', 
                        'Fireside Chat': 'border-orange-500 bg-orange-50/20',
                        'Break': 'border-emerald-500 bg-emerald-50/20', 
                        'Lunch': 'border-emerald-500 bg-emerald-50/20', 
                        'Workshop': 'border-amber-500 bg-amber-50/20' 
                    };
                    return map[type] || 'border-slate-300';
                },

                exportExcel() {
                    let csv = "Day,Start,End,Topic,Speaker,Duration,Type\n";
                    this.calculatedDay1.forEach(e => csv += `Day 1,${e.start},${e.end},"${e.topic.replace(/"/g, '""')}","${e.speaker}",${e.duration},${e.type}\n`);
                    this.calculatedDay2.forEach(e => csv += `Day 2,${e.start},${e.end},"${e.topic.replace(/"/g, '""')}","${e.speaker}",${e.duration},${e.type}\n`);
                    const a = document.createElement("a");
                    a.href = 'data:text/csv;charset=utf-8,' + encodeURI(csv);
                    a.download = 'iFAST_Symposium_2026.csv'; a.click();
                },

                getFullDataset() {
                    return {
                        conferenceTheme: "Return on Intelligence: AI & Global Wealth",
                        day1Theme: "AI Trends and Global Wealth", day2Theme: "The iFAST Ecosystem",
                        day1StartTime: "09:30", day2StartTime: "09:30",
                        day1Events: [
                            { id: "d1s1", topic: "Opening Speech", speaker: "Lim Chung Chun", duration: 10, type: "Internal Keynote" },
                            { id: "d1s2", topic: "AI isn't just a buzzword: It's becoming core to competitive advice delivery", speaker: "AI trainer", duration: 20, type: "External Keynote" },
                            { id: "d1s3", topic: "Panel Discussion: How Advisers Are Making Use of AI", speaker: "Bernard Chan (SG), Adviser 1 (HK), Adviser (MY)", duration: 40, type: "Panel Discussion" },
                            { id: "d1s4", topic: "FH Slot: BlackRock", speaker: "Nicholas Hoon Wei Hann", duration: 20, type: "Workshop" },
                            { id: "d1s5", topic: "Tea Break", speaker: "Emcee", duration: 20, type: "Break" },
                            { id: "d1s6", topic: "The Do-Bots Are Here: Exploring Digital employees that monitor client portfolios 24/7", speaker: "AI Speaker", duration: 20, type: "Workshop" },
                            { id: "d1s7", topic: "AI Demo: Building Your Own Advisory Tool in 15 minutes", speaker: "Video", duration: 10, type: "Workshop" },
                            { id: "d1s8", topic: "Hands On Workshop: Build Your App", speaker: "Free and Easy", duration: 30, type: "Workshop" },
                            { id: "d1s9", topic: "Group Photo", speaker: "Emcee", duration: 20, type: "Break" },
                            { id: "d1s10", topic: "Networking Lunch", speaker: "-", duration: 90, type: "Lunch" },
                            { id: "d1s11", topic: "FH Slot: Amova Asset Management", speaker: "Edward Pye Kaung Linn", duration: 20, type: "Workshop" },
                            { id: "d1s12", topic: "Think Global, Act Global: Bringing Clients from All Over the World", speaker: "Wee Kiong", duration: 15, type: "Internal Keynote" },
                            { id: "d1s13", topic: "Panel: The \"Truly Global\" Advisor: Breaking Geographic Boundaries", speaker: "3 Advisers + Dalton", duration: 50, type: "Panel Discussion" },
                            { id: "d1s14", topic: "Tea Break", speaker: "Emcee", duration: 20, type: "Break" },
                            { id: "d1s15", topic: "Global Product/Payment", speaker: "Dennis Tan", duration: 15, type: "Workshop" },
                            { id: "d1s16", topic: "FH slot: Principal Asset Management Berhad (MY)", speaker: "FH Speaker", duration: 15, type: "Workshop" },
                            { id: "d1s17", topic: "FH Slot: RHB Asset Management Sdn Bhd (MY)", speaker: "FH Speaker", duration: 15, type: "Workshop" },
                            { id: "d1s18", topic: "FH slot: Taikang Asset Management", speaker: "FH Speaker", duration: 20, type: "Workshop" },
                            { id: "d1s19", topic: "The Borderless IFA: What South Africa Teaches Us About Being Truly Global", speaker: "South African speaker", duration: 30, type: "Workshop" }
                        ],
                        day2Events: [
                            { id: "d2s1", topic: "Opening Speech", speaker: "Emcee", duration: 5, type: "Workshop" },
                            { id: "d2s2", topic: "Fireside Chat: Outsource the Alpha, Own the Relationship (DPMS)", speaker: "Vincent Tong, Mark Liu, LGI (Darius)", duration: 30, type: "Fireside Chat" },
                            { id: "d2s3", topic: "FH slot: J.P. Morgan Asset Management", speaker: "Daryl Leong", duration: 20, type: "Workshop" },
                            { id: "d2s4", topic: "The Platform-Powered \"Mini Private Banker\": Delivering UHNW Experiences to the Mass Affluent", speaker: "Wong Weiyi", duration: 20, type: "Workshop" },
                            { id: "d2s5", topic: "Tea Break", speaker: "-", duration: 15, type: "Break" },
                            { id: "d2s6", topic: "FH slot: AHAM Asset Management Berhad (MY)", speaker: "FH Speaker", duration: 15, type: "Workshop" },
                            { id: "d2s7", topic: "Showcase + Award Presentation for Top 3 AI tool", speaker: "Emcee", duration: 30, type: "Workshop" },
                            { id: "d2s8", topic: "Closing Speech", speaker: "Lim Chung Chun", duration: 10, type: "Workshop" },
                            { id: "d2s9", topic: "Lunch", speaker: "-", duration: 60, type: "Lunch" }
                        ]
                    };
                }
            }
        }
    </script>
</body>
</html>
