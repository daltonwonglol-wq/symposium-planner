<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFAST Symposium Planner 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        [x-cloak] { display: none !important; }
        .session-card { transition: all 0.2s ease; border-left-width: 6px; }
    </style>
</head>
<body class="bg-[#F8FAFC] min-h-screen" x-data="plannerApp()" x-init="init()">

    <!-- NAVBAR -->
    <nav class="bg-white border-b sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-700 rounded-xl flex items-center justify-center text-white font-bold text-xl">iF</div>
                <h1 class="font-black text-slate-900 tracking-tight">Symposium <span class="text-blue-600">Planner</span></h1>
            </div>

            <div class="flex items-center gap-4">
                <div class="bg-slate-100 p-1 rounded-xl flex items-center border">
                    <button @click="toggleEdit()" :class="isEdit ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500'" class="px-5 py-2 rounded-lg text-sm font-bold transition-all">Edit Mode</button>
                    <button @click="isEdit = false" :class="!isEdit ? 'bg-white shadow-sm text-emerald-600' : 'text-slate-500'" class="px-5 py-2 rounded-lg text-sm font-bold transition-all">Published</button>
                </div>
                <button @click="exportToExcel()" class="bg-slate-900 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-slate-800 transition">Export</button>
            </div>
        </div>
    </nav>

    <!-- EDITING BAR -->
    <div x-show="isEdit" x-transition class="bg-blue-600 text-white py-4 shadow-inner">
        <div class="max-w-7xl mx-auto px-6 grid grid-cols-1 md:grid-cols-3 gap-6">
            <div>
                <label class="text-[10px] font-bold opacity-70 uppercase block mb-1">Conference Theme</label>
                <input type="text" x-model="data.conferenceTheme" @input="updateUrl()" class="w-full bg-blue-500 border-none rounded-lg p-2 text-sm font-bold outline-none focus:ring-2 ring-white">
            </div>
            <div>
                <label class="text-[10px] font-bold opacity-70 uppercase block mb-1">Day 1 Theme</label>
                <input type="text" x-model="data.day1Theme" @input="updateUrl()" class="w-full bg-blue-500 border-none rounded-lg p-2 text-sm font-bold outline-none">
            </div>
            <div>
                <label class="text-[10px] font-bold opacity-70 uppercase block mb-1">Day 2 Theme</label>
                <input type="text" x-model="data.day2Theme" @input="updateUrl()" class="w-full bg-blue-500 border-none rounded-lg p-2 text-sm font-bold outline-none">
            </div>
        </div>
    </div>

    <!-- MAIN VIEW -->
    <main class="max-w-7xl mx-auto px-6 py-12">
        <div class="text-center mb-16">
            <h2 class="text-5xl font-black text-slate-900 tracking-tight" x-text="data.conferenceTheme"></h2>
            <p class="text-slate-400 font-bold mt-2 uppercase tracking-[0.2em] text-sm">2026 Wealth Management Symposium</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
            <template x-for="d in [1, 2]">
                <div class="space-y-6">
                    <div :class="d === 1 ? 'bg-slate-900' : 'bg-blue-700'" class="rounded-[2.5rem] p-8 text-white shadow-2xl flex justify-between items-end">
                        <div>
                            <h3 class="text-4xl font-black italic tracking-tighter">DAY 0<span x-text="d"></span></h3>
                            <p class="font-bold opacity-70 text-lg" x-text="data['day'+d+'Theme']"></p>
                        </div>
                        <div class="text-right">
                            <span class="text-[10px] font-bold opacity-50 uppercase block">Starts At</span>
                            <input x-show="isEdit" type="time" x-model="data['day'+d+'StartTime']" @input="updateUrl()" class="bg-white/10 rounded px-2 font-bold outline-none">
                            <span x-show="!isEdit" class="text-2xl font-black" x-text="data['day'+d+'StartTime']"></span>
                        </div>
                    </div>

                    <div class="space-y-4">
                        <template x-for="item in (d === 1 ? calculatedDay1 : calculatedDay2)" :key="item.id">
                            <div class="session-card bg-white border border-slate-200 p-6 rounded-2xl shadow-sm relative group" :class="getTypeColor(item.type)">
                                <div class="flex justify-between items-start mb-2">
                                    <span class="text-[10px] font-black uppercase tracking-widest px-2 py-1 rounded bg-slate-50 text-slate-500" x-text="item.type"></span>
                                    <span class="text-xs font-bold text-slate-400 font-mono" x-text="item.start + ' - ' + item.end"></span>
                                </div>
                                <h4 class="font-bold text-slate-800 text-lg mb-1" x-text="item.topic"></h4>
                                <div class="flex justify-between items-center mt-4">
                                    <p class="text-sm font-semibold text-slate-500 flex items-center gap-2">
                                        <i data-lucide="user" size="14"></i> <span x-text="item.speaker"></span>
                                    </p>
                                    <div x-show="isEdit" class="flex gap-2">
                                        <button @click="openEdit(d, item)" class="text-blue-500 hover:bg-blue-50 p-1.5 rounded-lg"><i data-lucide="edit-3" size="16"></i></button>
                                        <button @click="deleteItem(d, item.id)" class="text-rose-500 hover:bg-rose-50 p-1.5 rounded-lg"><i data-lucide="trash-2" size="16"></i></button>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>
                    <button x-show="isEdit" @click="openAdd(d)" class="w-full border-2 border-dashed border-slate-200 py-6 rounded-2xl text-slate-400 font-bold hover:border-blue-400 hover:text-blue-600 transition-all">+ Add Day <span x-text="d"></span> Session</button>
                </div>
            </template>
        </div>
    </main>

    <!-- MODAL -->
    <div x-show="showModal" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm" x-cloak>
        <div class="bg-white rounded-[2.5rem] max-w-lg w-full p-10 shadow-2xl space-y-6">
            <h3 class="text-2xl font-black" x-text="editingId ? 'Edit Session' : 'Add Session'"></h3>
            <div class="space-y-4">
                <input type="text" x-model="form.topic" placeholder="Topic" class="w-full bg-slate-50 p-4 rounded-xl font-bold outline-none">
                <input type="text" x-model="form.speaker" placeholder="Speaker" class="w-full bg-slate-50 p-4 rounded-xl font-bold outline-none">
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" x-model="form.duration" placeholder="Duration" class="bg-slate-50 p-4 rounded-xl font-bold outline-none">
                    <select x-model="form.type" class="bg-slate-50 p-4 rounded-xl font-bold outline-none">
                        <option>Keynote</option><option>Panel Discussion</option><option>Fireside Chat</option><option>Break</option><option>Lunch</option><option>Workshop</option>
                    </select>
                </div>
            </div>
            <button @click="saveEntry()" class="w-full bg-slate-900 text-white p-5 rounded-2xl font-black">Save to Itinerary</button>
        </div>
    </div>

    <script>
        function plannerApp() {
            return {
                isEdit: false, showModal: false, editingId: null, activeDay: 1,
                data: null,
                form: { topic: '', speaker: '', duration: 20, type: 'Keynote' },

                init() {
                    const urlParams = new URLSearchParams(window.location.search);
                    const iten = urlParams.get('itinerary');
                    if (iten) {
                        try { this.data = JSON.parse(decodeURIComponent(atob(iten))); } 
                        catch (e) { this.data = this.getDefaults(); }
                    } else {
                        this.data = this.getDefaults();
                    }
                    if (urlParams.get('mode') === 'edit') this.isEdit = true;
                    this.$nextTick(() => lucide.createIcons());
                },

                updateUrl() {
                    const blob = btoa(encodeURIComponent(JSON.stringify(this.data)));
                    const mode = this.isEdit ? 'edit' : 'view';
                    const newUrl = `${window.location.pathname}?mode=${mode}&itinerary=${blob}`;
                    window.history.replaceState(null, '', newUrl);
                },

                toggleEdit() {
                    if (this.isEdit) { this.isEdit = false; this.updateUrl(); return; }
                    if (prompt("Enter passcode:") === 'ifast') { this.isEdit = true; this.updateUrl(); }
                },

                calculate(events, startTime) {
                    if (!events) return [];
                    let curr = (startTime || "09:30").split(':').reduce((h, m) => h * 60 + parseInt(m), 0);
                    return events.map(e => {
                        const start = `${Math.floor(curr/60).toString().padStart(2,'0')}:${(curr%60).toString().padStart(2,'0')}`;
                        curr += parseInt(e.duration);
                        const end = `${Math.floor(curr/60).toString().padStart(2,'0')}:${(curr%60).toString().padStart(2,'0')}`;
                        return { ...e, start, end };
                    });
                },

                get calculatedDay1() { return this.calculate(this.data.day1Events, this.data.day1StartTime); },
                get calculatedDay2() { return this.calculate(this.data.day2Events, this.data.day2StartTime); },

                openAdd(d) { this.activeDay = d; this.editingId = null; this.form = { topic: '', speaker: '', duration: 20, type: 'Keynote' }; this.showModal = true; },
                openEdit(d, item) { this.activeDay = d; this.editingId = item.id; this.form = { ...item }; this.showModal = true; },
                
                saveEntry() {
                    const list = `day${this.activeDay}Events`;
                    if (this.editingId) {
                        const idx = this.data[list].findIndex(e => e.id === this.editingId);
                        this.data[list][idx] = { ...this.form };
                    } else {
                        this.data[list].push({ ...this.form, id: Date.now().toString() });
                    }
                    this.showModal = false; this.updateUrl();
                },

                deleteItem(d, id) { this.data[`day${d}Events`] = this.data[`day${d}Events`].filter(e => e.id !== id); this.updateUrl(); },

                getTypeColor(t) {
                    const map = { 'Keynote': 'border-rose-500', 'Panel Discussion': 'border-sky-500', 'Break': 'border-emerald-400', 'Lunch': 'border-emerald-500', 'Workshop': 'border-amber-500' };
                    return map[t] || 'border-slate-300';
                },

                exportToExcel() {
                    let csv = "Day,Type,Start,End,Topic,Speaker\n";
                    this.calculatedDay1.forEach(e => csv += `Day 1,${e.type},${e.start},${e.end},"${e.topic}","${e.speaker}"\n`);
                    this.calculatedDay2.forEach(e => csv += `Day 2,${e.type},${e.start},${e.end},"${e.topic}","${e.speaker}"\n`);
                    const a = document.createElement("a");
                    a.href = 'data:text/csv;charset=utf-8,' + encodeURI(csv);
                    a.download = 'Symposium_Itinerary.csv'; a.click();
                },

                getDefaults() {
                    return {
                        conferenceTheme: "Return on Intelligence: AI & Global Wealth",
                        day1Theme: "AI Trends and Global Wealth", day2Theme: "The iFAST Ecosystem",
                        day1StartTime: "09:30", day2StartTime: "09:30",
                        day1Events: [
                            { id: "1", topic: "Opening Speech", speaker: "Lim Chung Chun", duration: 10, type: "Keynote" },
                            { id: "2", topic: "AI isn't just a buzzword", speaker: "AI trainer", duration: 20, type: "Keynote" },
                            { id: "3", topic: "Panel: How Advisers Use AI", speaker: "Bernard Chan + Panel", duration: 40, type: "Panel Discussion" },
                            { id: "4", topic: "Tea Break", speaker: "Emcee", duration: 20, type: "Break" }
                        ],
                        day2Events: [
                            { id: "21", topic: "Opening Speech", speaker: "Emcee", duration: 5, type: "Workshop" },
                            { id: "22", topic: "Fireside Chat: Outsource the Alpha", speaker: "Vincent Tong", duration: 30, type: "Fireside Chat" }
                        ]
                    };
                }
            }
        }
    </script>
</body>
</html>
