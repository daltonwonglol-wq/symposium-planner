<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFAST Symposium 2026 | Global Wealth Adviser Symposium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Sortable.js removed as we are switching to Up/Down buttons -->

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDR2PyIsbw_hC-VX_o1wq3Hrs8ENsw6ik4",
            authDomain: "symposium-planner.firebaseapp.com",
            databaseURL: "https://symposium-planner-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "symposium-planner",
            storageBucket: "symposium-planner.firebasestorage.app",
            messagingSenderId: "849349532944",
            appId: "1:849349532944:web:7f24c18136cacdaee19995",
            measurementId: "G-TNQQ95DHMX"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        window.dbRef = ref(db, 'symposium_2026_v4'); 
        window.saveToCloud = (data) => set(window.dbRef, data);
        window.onCloudUpdate = (callback) => onValue(window.dbRef, (snapshot) => callback(snapshot.val()));
    </script>

    <style>
        [x-cloak] { display: none !important; }
        .session-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .session-card.clickable { cursor: pointer; }
        .session-card.clickable:hover { transform: translateY(-4px); border-color: #3b82f6; }
        input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(1); }
    </style>
</head>
<body class="bg-[#F8FAFC] text-slate-900 antialiased" x-data="plannerApp()" x-init="init()">

    <!-- TOP NAVIGATION -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
        <div class="max-w-[1600px] mx-auto px-4 md:px-8 h-16 md:h-24 flex justify-between items-center">
            <h1 class="text-[10px] sm:text-sm md:text-2xl font-black tracking-tighter text-slate-800 uppercase leading-tight max-w-[60%] md:max-w-none">
                iFAST GWAS 2026 <span class="text-blue-600">Conference Topics</span>
            </h1>

            <div class="flex items-center gap-4">
                <div class="flex bg-slate-100 p-1.5 rounded-2xl border border-slate-200 shadow-inner">
                    <button @click="toggleEdit()" :class="isEdit ? 'bg-white shadow-md text-blue-600' : 'text-slate-500'" class="px-6 py-2 rounded-xl text-xs font-black transition-all tracking-widest uppercase">Edit Mode</button>
                    <button @click="isEdit = false" :class="!isEdit ? 'bg-white shadow-md text-emerald-600' : 'text-slate-500'" class="px-6 py-2 rounded-xl text-xs font-black transition-all tracking-widest uppercase">Published</button>
                </div>
                <button @click="exportExcel()" class="bg-slate-900 text-white px-6 py-3 rounded-xl text-sm font-bold flex items-center gap-2 hover:bg-slate-800 transition shadow-lg shadow-slate-200">
                    <i data-lucide="download" size="18"></i> Export Excel
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-[1600px] mx-auto px-8 py-12">
        
        <!-- THEME HEADER -->
        <div class="mb-16">
            <template x-if="isEdit">
                <div class="space-y-2 group">
                    <label class="text-[10px] font-black text-blue-500 uppercase tracking-[0.3em]">Main Symposium Theme</label>
                    <input type="text" x-model="data.conferenceTheme" @input="sync()" class="text-6xl font-black text-slate-900 bg-transparent border-b-4 border-blue-50 w-full outline-none focus:border-blue-500 transition-colors py-2 tracking-tight">
                </div>
            </template>
            <h2 x-show="!isEdit" class="text-7xl font-black text-slate-900 tracking-tighter leading-tight" x-text="data.conferenceTheme"></h2>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-16">
            
            <template x-for="d in [1, 2]">
                <div class="space-y-8">
                    <!-- DAY HEADER CARD -->
                    <div :class="d === 1 ? 'bg-slate-900 shadow-2xl shadow-slate-200' : 'bg-blue-700 shadow-2xl shadow-blue-200'" class="rounded-[3rem] p-10 text-white relative overflow-hidden">
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="text-5xl font-black italic tracking-tighter">DAY 0<span x-text="d"></span></h3>
                            <div class="bg-white/10 backdrop-blur-md px-5 py-3 rounded-2xl border border-white/20 shadow-inner text-right">
                                <span class="text-[10px] font-bold uppercase opacity-60 tracking-widest block mb-1">Symposium Start</span>
                                <input x-show="isEdit" type="time" x-model="data['day'+d+'StartTime']" @input="sync()" class="bg-transparent font-black text-2xl outline-none cursor-pointer">
                                <span x-show="!isEdit" class="block font-black text-3xl" x-text="data['day'+d+'StartTime']"></span>
                            </div>
                        </div>
                        <div class="space-y-1">
                            <span class="text-[10px] font-bold uppercase opacity-50 tracking-widest">Focus Theme</span>
                            <template x-if="isEdit">
                                <input type="text" x-model="data['day'+d+'Theme']" @input="sync()" class="bg-transparent border-b border-white/20 text-2xl font-bold outline-none w-full py-1 focus:border-white">
                            </template>
                            <p x-show="!isEdit" class="text-2xl font-bold" x-text="data['day'+d+'Theme']"></p>
                        </div>
                    </div>

                    <!-- SESSION LIST -->
                    <div :id="'day'+d+'-list'" class="space-y-5 min-h-[200px] px-2">
                        <template x-for="(item, index) in (d === 1 ? calculatedDay1 : calculatedDay2)" :key="item.id">
                            <div 
                                @click="!isEdit && viewSynopsis(item)"
                                class="session-card bg-white p-7 rounded-[2.5rem] border border-slate-200 shadow-sm relative border-l-[14px]" 
                                :class="[getColor(item.type), !isEdit ? 'clickable' : '']"
                            >
                                
                                <div class="flex justify-between items-start mb-5">
                                    <div class="flex flex-wrap gap-2">
                                        <span class="text-[10px] font-black uppercase tracking-widest px-3 py-1.5 rounded-lg bg-slate-100 text-slate-600 border border-slate-200" x-text="item.type"></span>
                                        <div class="flex items-center gap-1.5 text-blue-600 bg-blue-50 px-3 py-1.5 rounded-lg border border-blue-100">
                                            <i data-lucide="timer" size="14"></i>
                                            <span class="text-[11px] font-black" x-text="item.duration + ' MINS'"></span>
                                        </div>
                                    </div>
                                    <div class="text-right">
                                        <div class="text-3xl font-black text-slate-800 tracking-tighter" x-text="item.start + ' — ' + item.end"></div>
                                    </div>
                                </div>
                                
                                <h4 class="text-2xl font-bold text-slate-900 mb-4 leading-tight pr-12" x-text="item.topic"></h4>
                                
                                <div class="flex justify-between items-end border-t border-slate-50 pt-5">
                                    <div class="flex flex-col gap-0.5">
                                        <div class="flex items-center gap-2 text-slate-800 font-bold">
                                            <i data-lucide="user-round" size="16" class="text-slate-400"></i>
                                            <span x-text="item.speaker"></span>
                                        </div>
                                        <div x-show="item.title" class="text-xs font-bold text-slate-400 uppercase tracking-wide ml-6" x-text="item.title"></div>
                                    </div>
                                    
                                    <div x-show="isEdit" class="flex gap-1">
                                        <!-- Reorder Controls -->
                                        <button @click.stop="moveItem(d, index, -1)" class="p-2.5 text-slate-400 hover:bg-slate-50 rounded-xl transition-colors" :disabled="index === 0" :class="index === 0 && 'opacity-20'"><i data-lucide="chevron-up" size="18"></i></button>
                                        <button @click.stop="moveItem(d, index, 1)" class="p-2.5 text-slate-400 hover:bg-slate-50 rounded-xl transition-colors" :disabled="index === (d === 1 ? data.day1Events.length - 1 : data.day2Events.length - 1)" :class="index === (d === 1 ? data.day1Events.length - 1 : data.day2Events.length - 1) && 'opacity-20'"><i data-lucide="chevron-down" size="18"></i></button>
                                        
                                        <button @click.stop="editItem(d, item)" class="p-2.5 text-blue-500 hover:bg-blue-50 rounded-xl transition-colors"><i data-lucide="pencil" size="18"></i></button>
                                        <button @click.stop="deleteItem(d, item.id)" class="p-2.5 text-red-400 hover:bg-red-50 rounded-xl transition-colors"><i data-lucide="trash-2" size="18"></i></button>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>

                    <!-- ADD BUTTON -->
                    <button x-show="isEdit" @click="addItem(d)" class="w-full border-4 border-dashed border-slate-200 p-10 rounded-[3rem] text-slate-300 font-black text-2xl hover:bg-white hover:border-blue-400 hover:text-blue-600 transition-all group">
                        <span class="group-hover:scale-110 transition-transform inline-block">+ Add Session to Day <span x-text="d"></span></span>
                    </button>
                </div>
            </template>
        </div>
    </main>

    <!-- SYNOPSIS VIEW MODAL (Published Mode) -->
    <div x-show="showViewModal" class="fixed inset-0 z-[110] flex items-center justify-center bg-slate-900/60 backdrop-blur-xl" x-cloak x-transition>
        <div @click.away="showViewModal = false" class="bg-white rounded-[3.5rem] max-w-2xl w-full p-12 shadow-2xl border border-white/20">
            <div class="mb-8">
                <span class="text-[10px] font-black uppercase tracking-widest px-3 py-1.5 rounded-lg bg-blue-50 text-blue-600 border border-blue-100" x-text="viewingItem?.type"></span>
                <h3 class="text-4xl font-black text-slate-900 tracking-tight mt-4 leading-tight" x-text="viewingItem?.topic"></h3>
                <div class="mt-4 flex items-center gap-3">
                    <div class="w-12 h-12 bg-slate-100 rounded-2xl flex items-center justify-center">
                        <i data-lucide="user-round" class="text-slate-400"></i>
                    </div>
                    <div>
                        <div class="font-bold text-slate-900" x-text="viewingItem?.speaker"></div>
                        <div class="text-xs font-bold text-slate-400 uppercase" x-text="viewingItem?.title"></div>
                    </div>
                </div>
            </div>
            
            <div class="space-y-4">
                <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Synopsis</h4>
                <div class="text-lg text-slate-600 leading-relaxed max-h-[40vh] overflow-y-auto pr-4" x-text="viewingItem?.synopsis || 'No synopsis available for this session.'"></div>
            </div>

            <button @click="showViewModal = false" class="w-full bg-slate-900 text-white p-6 rounded-[2rem] font-black text-xl mt-10 hover:bg-slate-800 transition-all">
                Close
            </button>
        </div>
    </div>

    <!-- EDIT/ADD MODAL -->
    <div x-show="showModal" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/40 backdrop-blur-xl" x-cloak x-transition>
        <div @click.away="showModal = false" class="bg-white rounded-[3.5rem] max-w-2xl w-full p-12 shadow-2xl border border-white/20">
            <div class="flex justify-between items-center mb-10">
                <h3 class="text-4xl font-black text-slate-900 tracking-tight" x-text="editingId ? 'Edit Session' : 'New Session'"></h3>
                <button @click="showModal = false" class="text-slate-300 hover:text-slate-900 transition-colors"><i data-lucide="x-circle" size="36"></i></button>
            </div>
            
            <div class="grid grid-cols-1 gap-8">
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-1">Presentation Topic</label>
                    <input x-model="form.topic" class="w-full bg-slate-50 border-2 border-slate-100 p-5 rounded-2xl outline-none focus:border-blue-500 font-bold text-lg transition-all">
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-1">Synopsis</label>
                    <textarea x-model="form.synopsis" rows="3" class="w-full bg-slate-50 border-2 border-slate-100 p-5 rounded-2xl outline-none focus:border-blue-500 font-bold transition-all" placeholder="Enter session details..."></textarea>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-1">Speaker Name</label>
                        <input x-model="form.speaker" class="w-full bg-slate-50 border-2 border-slate-100 p-5 rounded-2xl outline-none focus:border-blue-500 font-bold transition-all">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-1">Speaker Job Title</label>
                        <input x-model="form.title" placeholder="e.g. Chief Executive Officer" class="w-full bg-slate-50 border-2 border-slate-100 p-5 rounded-2xl outline-none focus:border-blue-500 font-bold transition-all">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-1">Duration (Mins)</label>
                        <input type="number" x-model="form.duration" class="w-full bg-slate-50 border-2 border-slate-100 p-5 rounded-2xl outline-none focus:border-blue-500 font-bold transition-all">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-1">Session Type</label>
                        <select x-model="form.type" class="w-full bg-slate-50 border-2 border-slate-100 p-5 rounded-2xl outline-none focus:border-blue-500 font-bold transition-all appearance-none cursor-pointer">
                            <option value="Internal Keynote">Internal Keynote</option>
                            <option value="External Keynote">External Keynote</option>
                            <option value="Panel Discussion">Panel Discussion</option>
                            <option value="Fireside Chat">Fireside Chat</option>
                            <option value="Break">Break</option>
                            <option value="Lunch">Lunch</option>
                            <option value="Workshop">Workshop</option>
                        </select>
                    </div>
                </div>
            </div>

            <button @click="saveEntry()" class="w-full bg-blue-600 text-white p-6 rounded-[2rem] font-black text-xl mt-10 shadow-xl shadow-blue-100 hover:bg-blue-700 hover:-translate-y-1 transition-all active:scale-95">
                Save Changes to Cloud
            </button>
        </div>
    </div>

    <script>
        function plannerApp() {
            return {
                isEdit: false, showModal: false, showViewModal: false, editingId: null, activeDay: 1,
                viewingItem: null,
                data: { conferenceTheme: 'Connecting to Cloud...', day1Events: [], day2Events: [] },
                form: { topic: '', speaker: '', title: '', duration: 20, type: 'Internal Keynote', synopsis: '' },

                init() {
                    setTimeout(() => {
                        window.onCloudUpdate((cloudData) => {
                            if (cloudData && cloudData.day1Events) {
                                this.data = JSON.parse(JSON.stringify(cloudData));
                            } else {
                                this.data = this.getFulliFASTDataset();
                                this.sync();
                            }
                            this.$nextTick(() => { 
                                lucide.createIcons();
                            });
                        });
                    }, 1000);
                },

                sync() { 
                    window.saveToCloud(JSON.parse(JSON.stringify(this.data))); 
                    this.$nextTick(() => lucide.createIcons());
                },

                toggleEdit() {
                    const pw = prompt("Enter Admin Access Code:");
                    if (pw === "ifast2026") { this.isEdit = true; this.$nextTick(() => lucide.createIcons()); }
                    else alert("Access Denied.");
                },

                calculate(events, startTime) {
                    if (!events) return [];
                    let curr = (startTime || "09:30").split(':').reduce((h, m) => h * 60 + parseInt(m), 0);
                    return events.map(e => {
                        const start = `${Math.floor(curr/60).toString().padStart(2,'0')}:${(curr%60).toString().padStart(2,'0')}`;
                        curr += parseInt(e.duration || 0);
                        const end = `${Math.floor(curr/60).toString().padStart(2,'0')}:${(curr%60).toString().padStart(2,'0')}`;
                        return { ...e, start, end };
                    });
                },

                get calculatedDay1() { return this.calculate(this.data.day1Events, this.data.day1StartTime); },
                get calculatedDay2() { return this.calculate(this.data.day2Events, this.data.day2StartTime); },

                // Change 1: New moveItem function replacing SortableJS
                moveItem(d, index, direction) {
                    const listKey = `day${d}Events`;
                    const list = [...this.data[listKey]];
                    const newIndex = index + direction;
                    
                    if (newIndex >= 0 && newIndex < list.length) {
                        const temp = list[index];
                        list[index] = list[newIndex];
                        list[newIndex] = temp;
                        this.data[listKey] = list;
                        this.sync();
                    }
                },

                // Change 2: Synopsis viewing
                viewSynopsis(item) {
                    this.viewingItem = item;
                    this.showViewModal = true;
                    this.$nextTick(() => lucide.createIcons());
                },

                addItem(d) {
                    this.activeDay = d; this.editingId = null;
                    this.form = { topic: '', speaker: '', title: '', duration: 20, type: 'Internal Keynote', synopsis: '' };
                    this.showModal = true;
                },

                editItem(d, item) {
                    this.activeDay = d; this.editingId = item.id;
                    this.form = { ...item };
                    this.showModal = true;
                },

                saveEntry() {
                    const listKey = `day${this.activeDay}Events`;
                    const list = [...this.data[listKey]];
                    if (this.editingId) {
                        const idx = list.findIndex(e => e.id === this.editingId);
                        list[idx] = { ...this.form };
                    } else {
                        list.push({ ...this.form, id: Date.now().toString() });
                    }
                    this.data[listKey] = list;
                    this.showModal = false; this.sync();
                },

                deleteItem(d, id) {
                    if(confirm("Permanently delete this session?")) {
                        const listKey = `day${d}Events`;
                        this.data[listKey] = this.data[listKey].filter(e => e.id !== id);
                        this.sync();
                    }
                },

                getColor(type) {
                    const map = { 
                        'Internal Keynote': 'border-blue-600 bg-blue-50/20 shadow-blue-50', 
                        'External Keynote': 'border-purple-600 bg-purple-50/20 shadow-purple-50',
                        'Panel Discussion': 'border-cyan-500 bg-cyan-50/20 shadow-cyan-50', 
                        'Fireside Chat': 'border-orange-500 bg-orange-50/20 shadow-orange-50',
                        'Break': 'border-emerald-500 bg-emerald-50/20 shadow-emerald-50', 
                        'Lunch': 'border-emerald-500 bg-emerald-50/20 shadow-emerald-50', 
                        'Workshop': 'border-amber-500 bg-amber-50/20 shadow-amber-50' 
                    };
                    return map[type] || 'border-slate-300';
                },

                exportExcel() {
                    let csv = "Day,Start,End,Topic,Speaker,Job Title,Duration(Min),Type\n";
                    this.calculatedDay1.forEach(e => csv += `Day 1,${e.start},${e.end},"${e.topic.replace(/"/g, '""')}","${e.speaker}","${e.title || ''}",${e.duration},${e.type}\n`);
                    this.calculatedDay2.forEach(e => csv += `Day 2,${e.start},${e.end},"${e.topic.replace(/"/g, '""')}","${e.speaker}","${e.title || ''}",${e.duration},${e.type}\n`);
                    const a = document.createElement("a");
                    a.href = 'data:text/csv;charset=utf-8,' + encodeURI(csv);
                    a.download = 'iFAST_Symposium_2026_Schedule.csv'; a.click();
                },

                getFulliFASTDataset() {
                    return {
                        conferenceTheme: "Return on Intelligence: AI & Global Wealth",
                        day1Theme: "AI Trends and Global Wealth", day2Theme: "The iFAST Ecosystem",
                        day1StartTime: "09:30", day2StartTime: "09:30",
                        day1Events: [
                            { id: "d1s1", topic: "Opening Speech", speaker: "Lim Chung Chun", title: "Chairman & CEO, iFAST Corp", duration: 10, type: "Internal Keynote", synopsis: "" },
                            { id: "d1s2", topic: "AI isn't just a buzzword: It's becoming core to competitive advice delivery", speaker: "AI trainer", title: "External Consultant", duration: 20, type: "External Keynote", synopsis: "" },
                            { id: "d1s3", topic: "Panel Discussion: How Advisers Are Making Use of AI", speaker: "Bernard Chan (SG), Advisers", title: "Panelists", duration: 40, type: "Panel Discussion", synopsis: "" },
                            { id: "d1s4", topic: "FH Slot: BlackRock", speaker: "Nicholas Hoon Wei Hann", title: "BlackRock Asset Management", duration: 20, type: "Workshop", synopsis: "" },
                            { id: "d1s5", topic: "Tea Break", speaker: "Emcee", title: "-", duration: 20, type: "Break", synopsis: "" },
                            { id: "d1s6", topic: "The Do-Bots Are Here: Digital employees monitor portfolios 24/7", speaker: "AI Speaker", title: "Tech Lead", duration: 20, type: "Workshop", synopsis: "" },
                            { id: "d1s7", topic: "AI Demo: Building Your Own Advisory Tool in 15 mins", speaker: "Video", title: "-", duration: 10, type: "Workshop", synopsis: "" },
                            { id: "d1s8", topic: "Hands On Workshop: Build Your App", speaker: "Free and Easy", title: "-", duration: 30, type: "Workshop", synopsis: "" },
                            { id: "d1s9", topic: "Group Photo", speaker: "Emcee", title: "-", duration: 20, type: "Break", synopsis: "" },
                            { id: "d1s10", topic: "Networking Lunch", speaker: "-", title: "-", duration: 90, type: "Lunch", synopsis: "" },
                            { id: "d1s11", topic: "FH Slot: Amova Asset Management", speaker: "Edward Pye Kaung Linn", title: "Amova Representative", duration: 20, type: "Workshop", synopsis: "" },
                            { id: "d1s12", topic: "Think Global, Act Global: Bringing Clients from All Over the World", speaker: "Wee Kiong", title: "Director, iFAST Corp", duration: 15, type: "Internal Keynote", synopsis: "" },
                            { id: "d1s13", topic: "Panel: The \"Truly Global\" Advisor", speaker: "3 Advisers + Dalton", title: "Global Wealth Panel", duration: 50, type: "Panel Discussion", synopsis: "" },
                            { id: "d1s14", topic: "Tea Break", speaker: "Emcee", title: "-", duration: 20, type: "Break", synopsis: "" },
                            { id: "d1s15", topic: "Global Product/Payment", speaker: "Dennis Tan", title: "Lead, Global Products", duration: 15, type: "Workshop", synopsis: "" },
                            { id: "d1s16", topic: "FH slot: Principal Asset Management (MY)", speaker: "FH Speaker", title: "Principal Representative", duration: 15, type: "Workshop", synopsis: "" },
                            { id: "d1s17", topic: "FH Slot: RHB Asset Management (MY)", speaker: "FH Speaker", title: "RHB Representative", duration: 15, type: "Workshop", synopsis: "" },
                            { id: "d1s18", topic: "FH slot: Taikang Asset Management", speaker: "FH Speaker", title: "Taikang Representative", duration: 20, type: "Workshop", synopsis: "" },
                            { id: "d1s19", topic: "The Borderless IFA: What South Africa Teaches Us", speaker: "South African speaker", title: "Global Partner", duration: 30, type: "Workshop", synopsis: "" }
                        ],
                        day2Events: [
