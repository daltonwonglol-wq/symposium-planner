<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFAST Symposium 2026 | Master Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // ============================================================
        // PASTE YOUR FIREBASE KEYS BELOW
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyDR2PyIsbw_hC-VX_o1wq3Hrs8ENsw6ik4",
            authDomain: "symposium-planner.firebaseapp.com",
            databaseURL: "https://symposium-planner-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "symposium-planner",
            storageBucket: "symposium-planner.firebasestorage.app",
            messagingSenderId: "849349532944",
            appId: "1:849349532944:web:7f24c18136cacdaee19995",
            measurementId: "G-TNQQ95DHMX"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        window.dbRef = ref(db, 'symposium_2026_v2'); // New version node
        window.saveToCloud = (data) => set(window.dbRef, data);
        window.onCloudUpdate = (callback) => onValue(window.dbRef, (snapshot) => callback(snapshot.val()));
    </script>

    <style>
        [x-cloak] { display: none !important; }
        .session-card { transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .sortable-ghost { opacity: 0; }
        .sortable-drag { background: white !important; transform: rotate(2deg); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="bg-[#F8FAFC] text-slate-900 font-sans antialiased" x-data="plannerApp()" x-init="init()">

    <!-- HEADER SECTION -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-[1440px] mx-auto px-8 h-24 flex justify-between items-center">
            <h1 class="text-2xl font-black tracking-tighter text-slate-900 uppercase">
                iFAST Global Wealth Adviser Symposium <span class="text-blue-600">Conference Topics 2026</span>
            </h1>

            <div class="flex items-center gap-6">
                <div class="bg-slate-100 p-1.5 rounded-2xl flex border border-slate-200">
                    <button @click="toggleEdit()" :class="isEdit ? 'bg-white shadow-md text-blue-600' : 'text-slate-500'" class="px-6 py-2 rounded-xl text-sm font-black transition-all">EDIT MODE</button>
                    <button @click="isEdit = false" :class="!isEdit ? 'bg-white shadow-md text-emerald-600' : 'text-slate-500'" class="px-6 py-2 rounded-xl text-sm font-black transition-all">PUBLISHED</button>
                </div>
                <button @click="exportExcel()" class="bg-slate-900 text-white px-6 py-3 rounded-xl text-sm font-bold hover:bg-slate-800 transition-colors flex items-center gap-2">
                    <i data-lucide="download" size="18"></i> Export Excel
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-[1440px] mx-auto px-8 py-12">
        <!-- THEME HEADER -->
        <div class="mb-16 max-w-4xl">
            <template x-if="isEdit">
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-blue-500 uppercase tracking-widest">Global Symposium Theme</label>
                    <input type="text" x-model="data.conferenceTheme" @input="sync()" class="text-5xl font-black text-slate-900 bg-transparent border-b-4 border-blue-100 w-full outline-none focus:border-blue-500 transition-colors py-2">
                </div>
            </template>
            <h2 x-show="!isEdit" class="text-6xl font-black text-slate-900 leading-[1.1]" x-text="data.conferenceTheme"></h2>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-16">
            
            <template x-for="d in [1, 2]">
                <div class="space-y-8">
                    <!-- DAY HEADER -->
                    <div :class="d === 1 ? 'bg-slate-900 shadow-xl shadow-slate-200' : 'bg-blue-600 shadow-xl shadow-blue-200'" class="rounded-[2.5rem] p-10 text-white">
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="text-4xl font-black italic tracking-tighter">DAY 0<span x-text="d"></span></h3>
                            <div class="bg-white/10 px-4 py-2 rounded-xl border border-white/20">
                                <span class="text-[10px] font-bold uppercase opacity-60 block">Start Time</span>
                                <input x-show="isEdit" type="time" x-model="data['day'+d+'StartTime']" @input="sync()" class="bg-transparent font-black text-xl outline-none">
                                <span x-show="!isEdit" class="font-black text-xl" x-text="data['day'+d+'StartTime']"></span>
                            </div>
                        </div>
                        <template x-if="isEdit">
                            <input type="text" x-model="data['day'+d+'Theme']" @input="sync()" class="bg-transparent border-b border-white/30 text-xl font-medium outline-none w-full py-1">
                        </template>
