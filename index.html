<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFAST Symposium 2026 | Live Itinerary</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // ==========================================
        // 1. PASTE YOUR FIREBASE CONFIG BELOW
        // ==========================================
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        window.dbRef = ref(db, 'symposium_data');
        window.saveToCloud = (data) => set(window.dbRef, data);
        window.onCloudUpdate = (callback) => onValue(window.dbRef, (snapshot) => callback(snapshot.val()));
    </script>
</head>
<body class="bg-[#F1F5F9] min-h-screen" x-data="plannerApp()" x-init="init()">

    <!-- Header -->
    <nav class="bg-white border-b sticky top-0 z-50 shadow-sm">
        <div class="max-w-[1400px] mx-auto px-6 h-20 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold">iF</div>
                <h1 class="font-black text-slate-800 text-xl tracking-tight">Symposium <span class="text-blue-600 font-normal text-sm">2026</span></h1>
            </div>

            <div class="flex items-center gap-4">
                <div class="flex bg-slate-100 p-1 rounded-xl border">
                    <button @click="toggleEdit()" :class="isEdit ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500'" class="px-5 py-2 rounded-lg text-sm font-bold transition-all">Edit Mode</button>
                    <button @click="isEdit = false" :class="!isEdit ? 'bg-white shadow-sm text-emerald-600' : 'text-slate-500'" class="px-5 py-2 rounded-lg text-sm font-bold transition-all">Published</button>
                </div>
                <button @click="exportExcel()" class="bg-slate-900 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-slate-800 transition">Export</button>
            </div>
        </div>
    </nav>

    <!-- UI -->
    <main class="max-w-[1400px] mx-auto px-6 py-10">
        <div class="mb-12 text-center">
            <template x-if="isEdit">
                <input type="text" x-model="data.conferenceTheme" @input="sync()" class="text-5xl font-black text-slate-900 text-center bg-transparent border-b-2 border-dashed border-blue-200 w-full outline-none">
            </template>
            <template x-if="!isEdit">
                <h2 class="text-5xl font-black text-slate-900" x-text="data.conferenceTheme"></h2>
            </template>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
            <!-- Loop Days 1 & 2 -->
            <template x-for="d in [1, 2]">
                <div class="space-y-6">
                    <div :class="d === 1 ? 'bg-slate-900' : 'bg-blue-700'" class="rounded-[2rem] p-8 text-white shadow-2xl relative overflow-hidden">
                        <div class="relative z-10 flex justify-between items-end">
                            <div>
                                <h3 class="text-sm font-bold uppercase tracking-[0.3em] opacity-60 mb-1">Day 0<span x-text="d"></span></h3>
                                <template x-if="isEdit">
                                    <input type="text" x-model="data['day'+d+'Theme']" @input="sync()" class="bg-transparent border-b border-white/20 text-2xl font-bold outline-none w-full">
                                </template>
                                <p x-show="!isEdit" class="text-2xl font-bold" x-text="data['day'+d+'Theme']"></p>
                            </div>
                            <div class="text-right">
                                <span class="text-[10px] font-bold uppercase opacity-50">StartTime</span>
                                <input x-show="isEdit" type="time" x-model="data['day'+d+'StartTime']" @input="sync()" class="bg-white/10 rounded px-2 block font-bold mt-1 outline-none">
                                <span x-show="!isEdit" class="block text-xl font-black" x-text="data['day'+d+'StartTime']"></span>
                            </div>
                        </div>
                    </div>

                    <div :id="'day'+d+'-list'" class="space-y-4 min-h-[100px]">
                        <template x-for="item in (d === 1 ? calculatedDay1 : calculatedDay2)" :key="item.id">
                            <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm relative group border-l-[6px]" :class="getColor(item.type)">
                                <div class="flex justify-between items-start mb-2">
                                    <span class="text-[10px] font-black uppercase tracking-widest px-2 py-1 rounded bg-slate-50" x-text="item.type"></span>
                                    <span class="text-xs font-bold text-slate-400 font-mono" x-text="item.start + ' - ' + item.end"></span>
                                </div>
                                <h4 class="font-bold text-slate-800 mb-1" x-text="item.topic"></h4>
                                <div class="flex justify-between items-center mt-3">
                                    <p class="text-xs font-semibold text-slate-500 italic" x-text="item.speaker"></p>
                                    <div x-show="isEdit" class="flex gap-2">
                                        <button @click="editItem(d, item)" class="p-1 hover:text-blue-600"><i data-lucide="edit-3" size="14"></i></button>
                                        <button @click="deleteItem(d, item.id)" class="p-1 hover:text-red-600"><i data-lucide="trash-2" size="14"></i></button>
                                        <div class="drag-handle p-1 cursor-grab text-slate-300"><i data-lucide="grip-vertical" size="14"></i></div>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>
                    <button x-show="isEdit" @click="addItem(d)" class="w-full border-2 border-dashed border-slate-300 p-4 rounded-2xl text-slate-400 font-bold hover:bg-white transition-all">+ Add Session</button>
                </div>
            </template>
        </div>
    </main>

    <!-- Modal -->
    <div x-show="showModal" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/80 backdrop-blur-sm" x-cloak>
        <div class="bg-white rounded-[2rem] max-w-lg w-full p-10 shadow-2xl">
            <h3 class="text-2xl font-black mb-6" x-text="editingId ? 'Edit Session' : 'Add Session'"></h3>
            <div class="space-y-4">
                <input x-model="form.topic" placeholder="Topic Name" class="w-full bg-slate-100 p-4 rounded-xl outline-none font-bold">
                <input x-model="form.speaker" placeholder="Speaker Name" class="w-full bg-slate-100 p-4 rounded-xl outline-none font-bold">
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" x-model="form.duration" placeholder="Mins" class="bg-slate-100 p-4 rounded-xl outline-none font-bold">
                    <select x-model="form.type" class="bg-slate-100 p-4 rounded-xl outline-none font-bold">
                        <option>Keynote</option><option>Panel Discussion</option><option>Fireside Chat</option><option>Break</option><option>Lunch</option><option>Workshop</option>
                    </select>
                </div>
            </div>
            <div class="flex gap-3 mt-8">
                <button @click="showModal = false" class="flex-1 p-4 font-bold text-slate-400">Cancel</button>
                <button @click="saveEntry()" class="flex-1 bg-blue-600 text-white p-4 rounded-xl font-bold">Save</button>
            </div>
        </div>
    </div>

    <script>
        function plannerApp() {
            return {
                isEdit: false, showModal: false, editingId: null, activeDay: 1,
                data: { conferenceTheme: 'Loading...', day1Events: [], day2Events: [] },
                form: { topic: '', speaker: '', duration: 20, type: 'Keynote' },

                init() {
                    // Start listening to Firebase
                    setTimeout(() => {
                        window.onCloudUpdate((cloudData) => {
                            if (cloudData) {
                                this.data = cloudData;
                            } else {
                                // First time setup: If cloud is empty, upload prefilled data
                                this.data = this.getPrefilledData();
                                this.sync();
                            }
                            this.$nextTick(() => { 
                                lucide.createIcons();
                                this.initSortable(1); this.initSortable(2);
                            });
                        });
                    }, 1500);
                },

                sync() { window.saveToCloud(JSON.parse(JSON.stringify(this.data))); },

                toggleEdit() {
                    const pw = prompt("Enter Admin Password:");
                    if (pw === "ifast2026") this.isEdit = true;
                    else alert("Wrong password.");
                },

                calculate(events, startTime) {
                    if (!events) return [];
                    let curr = (startTime || "09:30").split(':').reduce((h, m) => h * 60 + parseInt(m), 0);
                    return events.map(e => {
                        const start = `${Math.floor(curr/60).toString().padStart(2,'0')}:${(curr%60).toString().padStart(2,'0')}`;
                        curr += parseInt(e.duration);
                        const end = `${Math.floor(curr/60).toString().padStart(2,'0')}:${(curr%60).toString().padStart(2,'0')}`;
                        return { ...e, start, end };
                    });
                },

                get calculatedDay1() { return this.calculate(this.data.day1Events, this.data.day1StartTime); },
                get calculatedDay2() { return this.calculate(this.data.day2Events, this.data.day2StartTime); },

                initSortable(d) {
                    const el = document.getElementById(`day${d}-list`);
                    if (!el || el.sortableInstance) return;
                    el.sortableInstance = Sortable.create(el, {
                        handle: '.drag-handle', animation: 150,
                        onEnd: (evt) => {
                            const list = `day${d}Events`;
                            const item = this.data[list].splice(evt.oldIndex, 1)[0];
                            this.data[list].splice(evt.newIndex, 0, item);
                            this.sync();
                        }
                    });
                },

                addItem(d) {
                    this.activeDay = d; this.editingId = null;
                    this.form = { topic: '', speaker: '', duration: 20, type: 'Keynote' };
                    this.showModal = true;
                },

                editItem(d, item) {
                    this.activeDay = d; this.editingId = item.id;
                    this.form = { ...item };
                    this.showModal = true;
                },

                saveEntry() {
                    const list = `day${this.activeDay}Events`;
                    if (this.editingId) {
                        const idx = this.data[list].findIndex(e => e.id === this.editingId);
                        this.data[list][idx] = { ...this.form };
                    } else {
                        this.data[list].push({ ...this.form, id: Date.now().toString() });
                    }
                    this.showModal = false; this.sync();
                },

                deleteItem(d, id) {
                    this.data[`day${d}Events`] = this.data[`day${d}Events`].filter(e => e.id !== id);
                    this.sync();
                },

                getColor(type) {
                    const map = { 'Keynote': 'border-rose-500', 'Panel Discussion': 'border-blue-500', 'Break': 'border-emerald-500', 'Lunch': 'border-emerald-500' };
                    return map[type] || 'border-slate-300';
                },

                exportExcel() {
                    let csv = "Day,Start,End,Topic,Speaker,Type\n";
                    this.calculatedDay1.forEach(e => csv += `Day 1,${e.start},${e.end},"${e.topic}","${e.speaker}",${e.type}\n`);
                    this.calculatedDay2.forEach(e => csv += `Day 2,${e.start},${e.end},"${e.topic}","${e.speaker}",${e.type}\n`);
                    const a = document.createElement("a");
                    a.href = 'data:text/csv;charset=utf-8,' + encodeURI(csv);
                    a.download = 'ifast_itinerary.csv'; a.click();
                },

                getPrefilledData() {
                    return {
                        conferenceTheme: "Return on Intelligence: AI & Global Wealth",
                        day1Theme: "AI Trends and Global Wealth", day2Theme: "The iFAST Ecosystem",
                        day1StartTime: "09:30", day2StartTime: "09:30",
                        day1Events: [
                            { id: "1", topic: "Opening Speech", speaker: "Lim Chung Chun", duration: 10, type: "Keynote" },
                            { id: "2", topic: "AI isn't just a buzzword", speaker: "AI trainer", duration: 20, type: "Keynote" },
                            { id: "3", topic: "Panel: How Advisers Use AI", speaker: "Bernard Chan + Panel", duration: 40, type: "Panel Discussion" },
                            { id: "4", topic: "Tea Break", speaker: "Emcee", duration: 20, type: "Break" },
                            { id: "5", topic: "Networking Lunch", speaker: "-", duration: 90, type: "Lunch" }
                        ],
                        day2Events: [
                            { id: "10", topic: "Opening Speech", speaker: "Emcee", duration: 5, type: "Workshop" },
                            { id: "11", topic: "Fireside: Outsource the Alpha", speaker: "Vincent Tong", duration: 30, type: "Fireside Chat" }
                        ]
                    };
                }
            }
        }
    </script>
</body>
</html>
